name: Tests latest TRL release with dev dependencies

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC

  workflow_dispatch:

env:
  TQDM_DISABLE: 1
  CI_SLACK_CHANNEL: ${{ secrets.CI_PUSH_MAIN_CHANNEL }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  TRL_EXPERIMENTAL_SILENCE: 1

jobs:
  tests:
    name: Tests latest TRL release with dev dependencies
    runs-on:
      group: aws-g4dn-2xlarge
    container:
      image: pytorch/pytorch:2.8.0-cuda12.8-cudnn9-devel
      options: --gpus all
    defaults:
      run:
        shell: bash
    steps:
      - name: Git checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with: { ref: v1.6-release }

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Make and Git
        run: |
          apt-get update && apt-get install -y make git curl

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Create Python virtual environment
        run: |
          uv venv
          uv pip install --upgrade setuptools wheel

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -U \
            ".[dev]" \
            "accelerate @ git+https://github.com/huggingface/accelerate.git" \
            "datasets @ git+https://github.com/huggingface/datasets.git" \
            "transformers @ git+https://github.com/huggingface/transformers.git"

      - name: Test with pytest
        run: |
          source .venv/bin/activate
          make test

      - name: Post to Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_CIFEEDBACK_BOT_TOKEN }}
        run: |
          curl -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "channel": "${{ env.CI_SLACK_CHANNEL }}",
              "text": "Results of latest TRL with Python 3.12 and dev dependencies",
              "attachments": [{
                "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                "text": "Status: ${{ job.status }}"
              }]
            }'
