name: Upload PR Documentation

on:
  workflow_run:
    workflows: ["Build PR Documentation"]
    types:
      - completed

jobs:
  build:
    uses: huggingface/doc-builder/.github/workflows/upload_pr_documentation.yml@b0f9a6e3b6aa912656cbda9f74896eb721d29421  # main
    with:
      package_name: trl
    secrets:
      hf_token: ${{ secrets.HF_DOC_BUILD_PUSH }}
      comment_bot_app_id: ${{ secrets.COMMENT_BOT_APP_ID }}
      comment_bot_secret_pem: ${{ secrets.COMMENT_BOT_SECRET_PEM }}