name: "Hugging Face Issue Labeler"
on:
  issues:
    types: opened

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: August-murr/auto-labeler@0.0.1
        with:
            hf-api-key: ${{ secrets.CI_HF_API_TOKEN }}
