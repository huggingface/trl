model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# Single-node 30B-A3B sweep: find longest training-correct context on 1× 8×H100 node.
# Use the proven Liger recipe (FLCE + RMSNorm + RoPE, no swiglu patch) since it's the new champion.
#
# Memory budget per H100 (80 GB):
#   DS-Z2+EP=8 1n: ~14.5 GB params + ~30 GB optim (full per rank, no DP) + activations
#   DS-Z3+SP=8 1n: ~3.75 GB params/rank (Z3 sharded) + ~30 GB optim/rank (Z3 sharded across 8) + activations
#
# At per-rank seq=32k, activations are ~30 GB. So 32k per-rank ≈ ceiling.
# For SP=8 1n: total_ctx = 8 × 32k = 256k. So 256k is the expected max via SP.
# For EP=8 1n: per-rank seq = ctx (no SP). 32k may OOM due to optim+activation sum.

runs:
  # === EP path: how far does DS-Z2+EP=8 go on 1n ===
  - context_length: 16384
    nodes: 1
    backend: deepspeed_zero3
    dp: 1
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    zero_stage: 2
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 20
    logging_steps: 5

  - context_length: 32768
    nodes: 1
    backend: deepspeed_zero3
    dp: 1
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    zero_stage: 2
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 20
    logging_steps: 5

  # === SP path: long-ctx via Ulysses, intra-node only ===
  - context_length: 64768   # 64k - small slack
    nodes: 1
    backend: deepspeed_zero3
    dp: 1
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 20
    logging_steps: 5

  - context_length: 131072
    nodes: 1
    backend: deepspeed_zero3
    dp: 1
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 20
    logging_steps: 5

  - context_length: 262144
    nodes: 1
    backend: deepspeed_zero3
    dp: 1
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 15
    logging_steps: 5
