model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# Isolate: 64k 2n SP=4 + FA3 + grouped_mm (no sonicmoe). If this works, sonicmoe init is
# what's hanging. If it also hangs, the issue is DS-Z3 + SP + transformers in current state.

runs:
  - context_length: 65536
    nodes: 2
    backend: deepspeed_zero3
    dp: 4
    tp: 1
    pp: 1
    cp: 1
    sp: 4
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    max_steps: 50
    logging_steps: 5
