model_name_or_path: Qwen/Qwen3-235B-A22B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
cpu_ram_efficient_loading: false

# Post-EP-DataLoader-fix 235B sweep (2026-05-02 night).
# 235B = 470 GB bf16 (94 layers, hidden=4096, moe_int=1536, 128 experts top-8). Prior champion
# was 2.9% MFU at 32k 8n FSDP2+EP=64+CP=2+offload (params didn't fit without offload).
#
# Now with the EP DataLoader fix (C3) + post-#45621 sonicmoe + Liger, applying the 30B winning
# recipe (FSDP2 + EP + FA3 + Liger + sonic + post-fix). DS-Z2 won't fit (params replicated);
# DS-Z3+EP is blocked (D-blocker). FSDP2 shards params across world.
#
# Tier 1: feasibility — must work
runs:
  # B1 — 16k 8n FSDP2 + EP=8 (2D mesh: intra-node EP, inter-node DP)
  - context_length: 16384
    nodes: 8
    backend: fsdp2
    dp: 64
    tp: 1
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 1 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 30
    logging_steps: 5

  # B2 — 16k 16n FSDP2 + EP=8 (2D mesh, more headroom)
  - context_length: 16384
    nodes: 16
    backend: fsdp2
    dp: 128
    tp: 1
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 1 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 30
    logging_steps: 5

  # B3 — 32k 8n FSDP2 + EP=8 (push context at 8n)
  - context_length: 32768
    nodes: 8
    backend: fsdp2
    dp: 64
    tp: 1
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 1 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 30
    logging_steps: 5

  # B4 — 32k 16n FSDP2 + EP=8 (comfortable 32k)
  - context_length: 32768
    nodes: 16
    backend: fsdp2
    dp: 128
    tp: 1
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 1 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 30
    logging_steps: 5

  # Tier 2: context push
  # B5 — 64k 16n FSDP2 + EP=8
  - context_length: 65536
    nodes: 16
    backend: fsdp2
    dp: 128
    tp: 1
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 1 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 30
    logging_steps: 5

  # B6 — 16k 8n FSDP2 + EP=64 (flat EP across all ranks, ablation)
  - context_length: 16384
    nodes: 8
    backend: fsdp2
    dp: 64
    tp: 1
    pp: 1
    cp: 1
    ep: 64
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 64 --experts_implementation sonicmoe --pad_to_multiple_of 1 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 30
    logging_steps: 5

  # Tier 3: long context via SP path (no EP, DS-Z3)
  # B7 — 128k 16n DS-Z3 + SP=8 + Liger + sonic + compile
  - context_length: 131072
    nodes: 16
    backend: deepspeed_zero3
    zero_stage: 3
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 30
    logging_steps: 5

  # B8 — 256k 16n DS-Z3 + SP=8 (extreme context)
  - context_length: 262144
    nodes: 16
    backend: deepspeed_zero3
    zero_stage: 3
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 30
    logging_steps: 5
