model_name_or_path: Qwen/Qwen3-32B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8

runs:
  # --- 32B dense missing configs ---

  # #1: FSDP2 + liger + FA3, 16k, 4n (2n gave 51.3%)
  - context_length: 16384
    nodes: 4
    backend: fsdp2
    dp: 32
    tp: 1
    pp: 1
    cp: 1
    ep: 1
    extra_args: --use_liger_kernel true
    attn_implementation: "kernels-community/vllm-flash-attn3"

  # #2: FSDP2 + liger + FA3, 32k, 4n (2n gave 59.0%)
  - context_length: 32768
    nodes: 4
    backend: fsdp2
    dp: 32
    tp: 1
    pp: 1
    cp: 1
    ep: 1
    extra_args: --use_liger_kernel true
    attn_implementation: "kernels-community/vllm-flash-attn3"

  # #3: FSDP2 + liger + sdpa, 64k, 2n, CP=2 (no 64k run exists for 32B)
  - context_length: 65536
    nodes: 2
    backend: fsdp2
    dp: 8
    tp: 1
    pp: 1
    cp: 2
    ep: 1
    extra_args: --use_liger_kernel true

  # #4: DS-Z3 + liger + SP=2 + FA3, 64k, 2n (32k SP=2+FA3+liger gave 29.7%)
  - context_length: 65536
    nodes: 2
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 2
    ep: 1
    extra_args: --use_liger_kernel true
    attn_implementation: "kernels-community/vllm-flash-attn3"

  # #5: FSDP2 + liger + FA3 + TP=2, 16k, 2n (TP=2+liger sdpa gave 38.5%)
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 8
    tp: 2
    pp: 1
    cp: 1
    ep: 1
    extra_args: --use_liger_kernel true
    attn_implementation: "kernels-community/vllm-flash-attn3"
