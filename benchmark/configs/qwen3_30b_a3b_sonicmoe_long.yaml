model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

runs:
  # 50-step runs to capture steady-state MFU after JIT warmup
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe
    max_steps: 50
    logging_steps: 5
