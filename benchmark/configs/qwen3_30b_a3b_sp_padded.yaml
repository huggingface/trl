model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# Add --pad_to_multiple_of 8 in extra_args to fix Ulysses divisibility crash.
# Sweep: 64k 4n SP=4, 128k 4n SP=8, 128k 8n SP=8.

runs:
  # 64k 4n SP=4 (DP=8) — historical 21.26% peak, our 22092736 hit ~20% before crash
  - context_length: 65536
    nodes: 4
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 4
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8
    max_steps: 50
    logging_steps: 5

  # 128k 4n SP=8 (DP=4) — historical 19.31% peak
  - context_length: 131072
    nodes: 4
    backend: deepspeed_zero3
    dp: 4
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8
    max_steps: 50
    logging_steps: 5

  # 128k 8n SP=8 (DP=8) — new
  - context_length: 131072
    nodes: 8
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8
    max_steps: 50
    logging_steps: 5
