model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# Fourth batch:
# - 256k DS-Z3+SP=8 + chunked @ 8n: per-rank seq = 32k via intra-node Ulysses. Previous 256k SP=16 was cross-node (1.36%). SP=8 keeps groups intra-node. Goal: see if chunked unlocks 256k at decent MFU.
# - 16k DS-Z2+EP+chunked @ 2n: correctness baseline at the original 16k regime (was 40.4% w/o chunked, FSDP path).

runs:
  # 256k DS-Z3 + SP=8 (intra-node) + FA3 + chunked + sonicmoe
  - context_length: 262144
    nodes: 8
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 5

  # 16k DS-Z2 + EP=8 + chunked @ 2n (baseline correctness check, vs 40.4% FSDP+EP baseline)
  - context_length: 16384
    nodes: 2
    backend: deepspeed_zero3
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    zero_stage: 2
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 5
