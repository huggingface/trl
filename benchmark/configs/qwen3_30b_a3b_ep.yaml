model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
extra_args: --enable_expert_parallel

runs:
  # --- Expert-only EP (fixed RouterParallel + grouped_mm sentinel handling) ---

  # 1 node, 16k — EP=8 (16 local experts)
  - context_length: 16384
    nodes: 1
    backend: fsdp2
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    ep: 8

  # 2 nodes, 16k — EP=16 (8 local experts)
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 16

  # 4 nodes, 16k — EP=32 (4 local experts)
  - context_length: 16384
    nodes: 4
    backend: fsdp2
    dp: 32
    tp: 1
    pp: 1
    cp: 1
    ep: 32

  # 2 nodes, 32k — EP=16, CP=2
  - context_length: 32768
    nodes: 2
    backend: fsdp2
    dp: 8
    tp: 1
    pp: 1
    cp: 2
    ep: 16

  # 4 nodes, 32k — EP=32, CP=2
  - context_length: 32768
    nodes: 4
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 2
    ep: 32

  # 8 nodes, 16k — EP=64 (2 local experts)
  - context_length: 16384
    nodes: 8
    backend: fsdp2
    dp: 64
    tp: 1
    pp: 1
    cp: 1
    ep: 64

  # 8 nodes, 32k — EP=64, CP=2
  - context_length: 32768
    nodes: 8
    backend: fsdp2
    dp: 32
    tp: 1
    pp: 1
    cp: 2
    ep: 64
