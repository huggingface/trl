model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 8
zero_stage: 2

# DS-Z2+EP+compile sweep at 32k/64k. Baseline at 16k = 36.7% MFU window (compile)
# vs 28.6% (no compile). Goal: see if EP+compile carries to longer ctx, or if
# activation memory limits things.
#
# Note: DS-Z2 doesn't shard params, so per-rank model = ~17B (full minus 7/8 of
# experts). Activations grow linearly with seq. 16k peak mem was 92% — 32k may OOM.
# More nodes don't help param mem (only optim/grads).

runs:
  # 32k DS-Z2 + EP=8 + compile @ 2n (DP=2 over EP=8 with TP=8 mesh)
  - context_length: 32768
    nodes: 2
    backend: deepspeed_zero3
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    max_steps: 30
    logging_steps: 5

  # 32k DS-Z2 + EP=8 (no compile, baseline)
  - context_length: 32768
    nodes: 2
    backend: deepspeed_zero3
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    max_steps: 30
    logging_steps: 5

  # 32k DS-Z2 + EP=8 + compile @ 4n (DP=4, more grad/optim shards)
  - context_length: 32768
    nodes: 4
    backend: deepspeed_zero3
    dp: 4
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    max_steps: 30
    logging_steps: 5

  # 64k DS-Z2 + EP=8 + compile @ 4n
  - context_length: 65536
    nodes: 4
    backend: deepspeed_zero3
    dp: 4
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    max_steps: 30
    logging_steps: 5
