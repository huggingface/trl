model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

runs:
  # CONTROL: 16k FSDP2 sdpa, no sonicmoe (baseline: 23.1% MFU)
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 1

  # 16k FSDP2 sdpa + sonicmoe
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 1
    extra_args: --experts_implementation sonicmoe

  # 16k FSDP2 FA3 + sonicmoe (baseline FA3: 25.7% MFU)
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe

  # 32k DS-Z3+SP2 FA3 + sonicmoe (baseline: 14.5% MFU)
  - context_length: 32768
    nodes: 2
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 2
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe
