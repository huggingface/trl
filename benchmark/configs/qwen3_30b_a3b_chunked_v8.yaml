model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# Eighth batch — exploit "less SP groups = higher MFU" finding.
# Sweet spot: per-rank seq = 128k. At 256k SP=2 + compile we got 58% peak / 50% cum at 87% mem.
# The MFU goes up as we reduce SP because Ulysses all-to-all is the bottleneck.
#
# Try the same per-rank=128k at 512k and 1M:
#   - 512k SP=4 @ 8n: per-rank=128k (same as 256k SP=2). DP=16.
#   - 1M SP=8 @ 8n: per-rank=128k. DP=8. Intra-node SP only. Maximum context.

runs:
  # 512k SP=4 + compile @ 8n
  - context_length: 524288
    nodes: 8
    backend: deepspeed_zero3
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    sp: 4
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 20
    logging_steps: 5

  # 1M SP=8 + compile @ 8n (per-rank=128k same as the others)
  - context_length: 1048576
    nodes: 8
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 15
    logging_steps: 5
