model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# 1n CPU-offload sweep — offload optimizer + params to CPU to free GPU memory.
# Trade: ~10-30% MFU drop for ability to go past 32k on 1n.
#
# Hypothesis: at 64k 1n the optim states (~30 GB/rank without DP sharding) are
# what's hitting the 80 GB wall. Offload moves them to CPU RAM (each H100 node has
# ~1-2 TB of CPU RAM, plenty), freeing ~30 GB on GPU.

runs:
  # 64k 1n SP=8 + offload + Liger
  - context_length: 65536
    nodes: 1
    backend: deepspeed_zero3
    dp: 1
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    cpu_offload: true
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 20
    logging_steps: 5

  # 128k 1n SP=8 + offload + Liger (was OOM without offload)
  - context_length: 131072
    nodes: 1
    backend: deepspeed_zero3
    dp: 1
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    cpu_offload: true
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 20
    logging_steps: 5

  # 256k 1n SP=8 + offload + Liger (was OOM without offload)
  - context_length: 262144
    nodes: 1
    backend: deepspeed_zero3
    dp: 1
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    cpu_offload: true
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 15
    logging_steps: 5
