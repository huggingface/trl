model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# 4 nodes: dp_shard=8, more partitioning of params/optimizer than 2n.
# Historical 64k DS-Z3+SP=4+FA3+sonicmoe at 4n hit 65.9 GB / 21.26% peak MFU.

runs:
  - context_length: 65536
    nodes: 4
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 4
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe
    max_steps: 50
    logging_steps: 5
