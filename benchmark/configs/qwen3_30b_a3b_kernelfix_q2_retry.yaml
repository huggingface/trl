model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
cpu_ram_efficient_loading: false

# Q2 retry — original 22099363 hit TCPStore broken pipe at 18:20 pre-first-step,
# remained zombie until cancelled at 18:58. Pattern of +compile+multi-node init failing.
runs:
  - context_length: 65536
    nodes: 4
    backend: deepspeed_zero3
    zero_stage: 2
    dp: 32
    tp: 1
    pp: 1
    cp: 1
    ep: 32
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --enable_expert_parallel --expert_parallel_size 32 --experts_implementation sonicmoe --pad_to_multiple_of 1 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 50
    logging_steps: 5
