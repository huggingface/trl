model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
zero_stage: 2

# Push DS-Z2+EP=8+chunked_nll along the context curve.
# Baseline: 32k @ 2n = 45.81% MFU window, 55 GB peak (job 22093973). Lots of headroom.
#
# Plan:
#   - 32k @ 2n + compile: does compile add ~5 pp on top of chunked? (compile gave +8 pp at 16k DS-Z2)
#   - 64k @ 2n: per-rank seq = 64k, activation memory ~2x. Will it fit?
#   - 64k @ 4n: more DP for optim sharding (DS-Z2 doesn't shard params, so DP only helps optim/grads)
#   - 128k @ 4n: aggressive push, per-rank seq = 128k

runs:
  # 32k DS-Z2 + EP=8 + chunked + compile (vs 45.81% baseline)
  - context_length: 32768
    nodes: 2
    backend: deepspeed_zero3
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 5

  # 64k DS-Z2 + EP=8 + chunked @ 2n
  - context_length: 65536
    nodes: 2
    backend: deepspeed_zero3
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 5

  # 64k DS-Z2 + EP=8 + chunked @ 4n
  - context_length: 65536
    nodes: 4
    backend: deepspeed_zero3
    dp: 4
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 5

  # 128k DS-Z2 + EP=8 + chunked @ 4n
  - context_length: 131072
    nodes: 4
    backend: deepspeed_zero3
    dp: 4
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 5
