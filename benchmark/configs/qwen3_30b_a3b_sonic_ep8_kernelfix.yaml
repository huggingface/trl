model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
cpu_ram_efficient_loading: false
# Verify the 2026-05-01 PR #45621 update: sonicmoe wrapper drops the clamp because the kernel
# now handles sentinels correctly (per Ilyas, kernel-side fix pushed today). If training is
# healthy here at the same MFU as before, we can drop our ~2pp clamp workaround for good.
extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe

runs:
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    max_steps: 50
    logging_steps: 5
