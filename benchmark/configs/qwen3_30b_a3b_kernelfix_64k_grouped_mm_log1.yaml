model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
cpu_ram_efficient_loading: false

# Test F 2026-05-02: sonicmoe -> grouped_mm experts kernel.
# Hypothesis (from NCCL flight recorder analysis of Tests D + E): hang is on PG2
# all-reduce in 'scheduled, never started' state, meaning the CUDA kernel that
# precedes the all-reduce (sonicmoe Triton experts forward) never completed.
# If grouped_mm runs past step 16, sonicmoe is the culprit.
# Same as Test D config but --experts_implementation grouped_mm (vs sonicmoe).
runs:
  - context_length: 65536
    nodes: 2
    backend: deepspeed_zero3
    zero_stage: 2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation grouped_mm --pad_to_multiple_of 1 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 1
