model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe

# DS-Z3 + EP=8 smoke test for the new tagging-based integration.
# Pre-fix this config got 32.72% MFU NaN (loss 62, weights clobbered by DS broadcast).
# Post-fix expectation: healthy training (loss 10-14) at similar MFU.

runs:
  - context_length: 16384
    nodes: 2
    backend: deepspeed_zero3
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    max_steps: 50
    logging_steps: 5
