model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
cpu_ram_efficient_loading: false
extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe

# 32k with CP=2 EP=8 (per-rank seq 16k, lighter CP penalty than CP=4 at 64k).
# Pre-fix this config gave 4.77% NaN. Post-fix should be higher MFU + healthy.

runs:
  - context_length: 32768
    nodes: 2
    backend: fsdp2
    dp: 1
    tp: 8
    pp: 1
    cp: 2
    ep: 8
    max_steps: 50
    logging_steps: 5

  - context_length: 32768
    nodes: 4
    backend: fsdp2
    dp: 2
    tp: 8
    pp: 1
    cp: 2
    ep: 8
    max_steps: 50
    logging_steps: 5
