model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
attn_implementation: "kernels-community/vllm-flash-attn3"

runs:
  # --- 30B-A3B MoE missing configs ---

  # #1: FSDP2 + FA3, 16k, 2n, DP=16, no CP (baseline sdpa: 23.1%)
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 1

  # #2: FSDP2 + FA3 + EP=16, 16k, 2n (baseline sdpa+EP: 23.1%)
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 16
    extra_args: --enable_expert_parallel

  # #3: DS-Z3 + SP=4 + FA3, 64k, 2n (baseline SP=4+FA2: 11.6%)
  - context_length: 65536
    nodes: 2
    backend: deepspeed_zero3
    dp: 4
    tp: 1
    pp: 1
    cp: 1
    sp: 4
    ep: 1

  # #4: DS-Z3 + SP=2 + FA3, 32k, 2n, full 20-step (only had 5-step srun)
  - context_length: 32768
    nodes: 2
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 2
    ep: 1

  # #5: DS-Z3 + SP=2 + FA3, 16k, 2n (never tested)
  - context_length: 16384
    nodes: 2
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 2
    ep: 1
