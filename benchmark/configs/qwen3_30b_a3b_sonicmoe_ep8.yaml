model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe

runs:
  # 50-step sonicmoe + EP=8 + sdpa
  # Compare against:
  #   - grouped_mm + EP=8 + sdpa + PR #45621: 27.50% window MFU
  #   - sonicmoe + FA3 (no EP, 50 steps): 34.70% window MFU
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    max_steps: 50
    logging_steps: 5

  # 50-step sonicmoe + EP=8 + FA3 (may fail — known FA3+EP mesh incompat from report)
  - context_length: 16384
    nodes: 2
    backend: fsdp2
    dp: 2
    tp: 8
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    max_steps: 50
    logging_steps: 5
