model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# Fifth batch — push to 512k. 256k SP=8+chunked used only 45% mem at 32% MFU, so room to grow.
# Strategy: keep SP=8 intra-node, scale nodes to bring per-rank seq to a manageable level.
#
# - 512k DS-Z3+SP=8+chunked @ 16n: per-rank seq = 32k (same as 256k @ 8n). Should have similar MFU (~32%) at 16n if comm scales. Headline frontier.
# - 256k DS-Z3+SP=8+chunked + compile @ 8n: does compile help SP path? (compile gave 0 with EP+chunked; maybe SP differs)
# - 256k DS-Z3+SP=4+chunked @ 8n: per-rank seq = 64k via SP=4, less Ulysses comm. Trade activation mem for comm savings?

runs:
  # 512k SP=8 @ 16n (intra-node SP groups, per-rank seq = 32k)
  - context_length: 524288
    nodes: 16
    backend: deepspeed_zero3
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    qos: high
    max_steps: 20
    logging_steps: 5

  # 256k SP=8 + compile (does compile help SP+chunked at long ctx?)
  - context_length: 262144
    nodes: 8
    backend: deepspeed_zero3
    dp: 8
    tp: 1
    pp: 1
    cp: 1
    sp: 8
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    use_regional_compilation: true
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 5

  # 256k SP=4 (less SP comm, more per-rank activation)
  - context_length: 262144
    nodes: 8
    backend: deepspeed_zero3
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    sp: 4
    ep: 1
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --experts_implementation sonicmoe --pad_to_multiple_of 8 --loss_type chunked_nll
    max_steps: 30
    logging_steps: 5
