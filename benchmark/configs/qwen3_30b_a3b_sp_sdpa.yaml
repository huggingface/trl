model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark

# Plain DS-Z3 + SP=4 + sdpa, no FA3, no sonicmoe — eliminates kernel download as hang source.
runs:
  - context_length: 65536
    nodes: 2
    backend: deepspeed_zero3
    dp: 4
    tp: 1
    pp: 1
    cp: 1
    sp: 4
    ep: 1
    max_steps: 50
    logging_steps: 5
