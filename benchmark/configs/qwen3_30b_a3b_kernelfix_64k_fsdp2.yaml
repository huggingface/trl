model_name_or_path: Qwen/Qwen3-30B-A3B
dataset_name: THUDM/LongAlign-10k
gpus_per_node: 8
trackio_project: trl-sft-benchmark
cpu_ram_efficient_loading: false

# 2026-05-01 21:25 — 64k 2n FSDP2 + EP=8 + sonicmoe-with-clamp + Liger + FA3.
# Tests whether DeepSpeed-Z2 is responsible for the EP-multi-node ALLREDUCE-PG-ID-2 hang.
# Same shape and EP topology as P2 ×3 but using FSDP2 instead of DS-Z2.
# (Earlier kernel-fix-era 22099324 = 16k 2n FSDP2+EP=8+sonicmoe = 48.2% peak worked.)
runs:
  - context_length: 65536
    nodes: 2
    backend: fsdp2
    dp: 16
    tp: 1
    pp: 1
    cp: 1
    ep: 8
    attn_implementation: "kernels-community/vllm-flash-attn3"
    extra_args: --enable_expert_parallel --expert_parallel_size 8 --experts_implementation sonicmoe --pad_to_multiple_of 1 --use_liger_kernel true --liger_kernel_config '{"swiglu":false}'
    max_steps: 50
    logging_steps: 5
